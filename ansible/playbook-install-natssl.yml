---
# 1) Бинарник + каталоги + зависимости на всех хостах
- name: NATSSL — common provisioning
  hosts: natssl_master:natssl_clients
  become: true
  roles:
    - natssl_common

# 2) Мастер: config -> bootstrap -> service -> экспорт fingerprint + recovery_public_key
- name: NATSSL — master
  hosts: natssl_master
  become: true
  roles:
    - natssl_master

# 3) Клиенты: используют факты, собранные на мастере (hostvars), затем enroll
- name: NATSSL — clients
  hosts: natssl_clients
  become: true
  roles:
    - natssl_client

# 4) (ОПЦИОНАЛЬНО, по тегу) Выпуск сертификатов на мастере для каждого клиента
#    + доставка .crt/.key обратно на клиент. Не выполняется в обычном прогоне.
#    serial: 1 => строго ПОСЛЕДОВАТЕЛЬНО, хост за хостом из [natssl_clients].
#    Перевыпуск (revoke+issue): -e natssl_reissue=true
- name: NATSSL — issue per-client certificates on the master
  hosts: natssl_clients
  become: true
  gather_facts: false
  serial: 1
  tags:
    - never
    - issue_client_certs
  roles:
    - natssl_issue

